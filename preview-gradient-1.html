<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preview 1 — Ondes roses</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }

  /* ── Gradient animé : bands roses qui descendent ── */
  body {
    background: linear-gradient(180deg,
      #ff0080 0%,
      #ff4db8 16%,
      #ff1493 33%,
      #ff69b4 50%,
      #ff0080 66%,
      #ff4db8 83%,
      #ff1493 100%
    );
    background-size: 100% 300%;
    animation: slide 5s linear infinite;
  }

  @keyframes slide {
    0%   { background-position: 0% 0%; }
    100% { background-position: 0% 100%; }
  }

  /* ── Grille d'étoiles (simulation) ── */
  #stars {
    position: fixed;
    inset: 0;
    display: grid;
    pointer-events: none;
  }

  /* ── Contenu centré ── */
  .content {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    z-index: 2;
  }
  .title {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 38px;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,.25);
    letter-spacing: -0.02em;
    text-align: center;
  }
  .field {
    width: 290px;
    height: 52px;
    background: rgba(255,255,255,0.85);
    border-radius: 100px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    font-family: Georgia, serif;
    font-size: 18px;
    color: #999;
  }
  .btn {
    width: 155px;
    height: 52px;
    background: linear-gradient(180deg,#E3F5FE 0%,#0063E7 49.52%,#60D9FE 100%);
    border: 1px solid #0052BC;
    border-radius: 100px;
    color: #fff;
    font-family: Georgia, serif;
    font-size: 22px;
    cursor: pointer;
  }
  .badge {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.35);
    color: #fff;
    font-family: sans-serif;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 100px;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="stars"></div>

<div class="content">
  <div class="title">compatibilité<br>astrale</div>
  <div class="field">prénom 1</div>
  <div class="field">prénom 2</div>
  <div class="field">date de naissance</div>
  <div class="btn" style="display:flex;align-items:center;justify-content:center">voir</div>
</div>

<div class="badge">Option 1 — Ondes roses · 5s loop</div>

<script>
const SYMS = ['✩','✧','＊','*','˚','₊','⁺','°','✦','⋆','˖','•','‧',
  '★','✪','☆','✨','💫','✱','✰','⋆','˖']
const COLORS = [
  '#ff9dc8','#ffb3d9','#ff80b3','#ffc2e0','#ffffff',
  '#ffaacc','#ff66a3','#ffe0ef','#ff99cc','#fff','#f8a8cc'
]

const grid = document.getElementById('stars')
const CELL = 32
function build() {
  grid.innerHTML = ''
  const cols = Math.ceil(window.innerWidth / CELL)
  const rows = Math.ceil(window.innerHeight / CELL)
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`
  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`
  const cells = []
  for (let i = 0; i < cols * rows; i++) {
    const d = document.createElement('div')
    d.style.cssText = 'display:flex;align-items:center;justify-content:center;font-size:17px;'
    d.textContent = SYMS[Math.floor(Math.random() * SYMS.length)]
    const c = COLORS[Math.floor(Math.random() * COLORS.length)]
    d.style.color = c
    d.dataset.base = c
    grid.appendChild(d)
    cells.push(d)
  }
  return cells
}
let cells = build()
window.addEventListener('resize', () => { cells = build() })

function twinkle() {
  const n = Math.floor(Math.random() * 4) + 1
  for (let i = 0; i < n; i++) {
    const c = cells[Math.floor(Math.random() * cells.length)]
    if (!c) continue
    c.style.transition = 'color .05s'
    c.style.color = '#fff'
    c.style.fontSize = '20px'
    setTimeout(() => { c.style.color = c.dataset.base; c.style.fontSize = '17px' }, 150 + Math.random()*200)
  }
  setTimeout(twinkle, 80 + Math.random() * 250)
}
twinkle()
</script>
</body>
</html>
