<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preview 6 — Dégradé diffus</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }

  /*
    Un seul stop par couleur → transition continue et diffuse.
    Cycle 1200px (taille "moyenne" validée), vitesse ~6s.
    Loop sans couture : commence et finit sur blanc.
  */
  body {
    background: repeating-linear-gradient(
      180deg,
      #ffffff   0%,
      #00ccff  20%,
      #fbff00  40%,
      #fb97d3  65%,
      #e74fa5  85%,
      #ffffff 100%
    );
    background-size: 100% 1200px;
    animation: slide 6s linear infinite;
  }

  @keyframes slide {
    from { background-position: 0 0; }
    to   { background-position: 0 1200px; }
  }

  #stars {
    position: fixed; inset: 0;
    display: grid;
    pointer-events: none;
    z-index: 1;
  }

  .content {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px; z-index: 2;
  }
  .title {
    font-family: Georgia, serif; font-style: italic;
    font-size: 38px; color: #fff;
    text-shadow: 0 2px 14px rgba(0,0,0,.22);
    letter-spacing: -0.02em; text-align: center;
  }
  .field {
    width: 290px; height: 52px;
    background: rgba(255,255,255,0.85);
    border-radius: 100px;
    display: flex; align-items: center;
    padding: 0 24px;
    font-family: Georgia, serif; font-size: 18px; color: #999;
  }
  .btn-cta {
    width: 155px; height: 52px;
    background: linear-gradient(180deg,#E3F5FE 0%,#0063E7 49.52%,#60D9FE 100%);
    border: 1px solid #0052BC; border-radius: 100px;
    color: #fff; font-family: Georgia, serif; font-size: 22px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Contrôles vitesse ── */
  .controls {
    position: fixed; top: 14px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 10;
  }
  .ctrl {
    background: rgba(0,0,0,0.3); color: #fff;
    font-family: sans-serif; font-size: 13px;
    padding: 6px 14px; border-radius: 100px;
    border: none; cursor: pointer;
  }
  .ctrl.active { background: rgba(0,0,0,0.72); font-weight: bold; }
</style>
</head>
<body>

<div id="stars"></div>

<div class="content">
  <div class="title">compatibilité<br>astrale</div>
  <div class="field">prénom 1</div>
  <div class="field">prénom 2</div>
  <div class="field">date de naissance</div>
  <div class="btn-cta">voir</div>
</div>

<div class="controls">
  <button class="ctrl" onclick="setSpeed(10, this)">lent</button>
  <button class="ctrl active" onclick="setSpeed(6, this)">normal</button>
  <button class="ctrl" onclick="setSpeed(3, this)">rapide</button>
</div>

<script>
function setSpeed(s, btn) {
  document.body.style.animation = 'none'
  requestAnimationFrame(() => {
    document.body.style.animation = `slide ${s}s linear infinite`
  })
  document.querySelectorAll('.ctrl').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
}

const SYMS = ['✩','✧','＊','*','˚','₊','⁺','°','✦','⋆','˖','•','‧',
  '★','✪','☆','✨','💫','✱','✰','⋆']
const COLORS = [
  '#b3eeff','#ccf6ff','#fff',
  '#fffdb3','#fffacc',
  '#fdc8e8','#fbaad8',
  '#f48cc5','#fff',
  '#ffffff','#e8faff'
]
const grid = document.getElementById('stars')
const CELL = 32
function build() {
  grid.innerHTML = ''
  const cols = Math.ceil(window.innerWidth / CELL)
  const rows = Math.ceil(window.innerHeight / CELL)
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`
  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`
  const cells = []
  for (let i = 0; i < cols * rows; i++) {
    const d = document.createElement('div')
    d.style.cssText = 'display:flex;align-items:center;justify-content:center;font-size:17px;'
    d.textContent = SYMS[Math.floor(Math.random() * SYMS.length)]
    const c = COLORS[Math.floor(Math.random() * COLORS.length)]
    d.style.color = c; d.dataset.base = c
    grid.appendChild(d); cells.push(d)
  }
  return cells
}
let cells = build()
window.addEventListener('resize', () => { cells = build() })

function twinkle() {
  const n = Math.floor(Math.random() * 4) + 1
  for (let i = 0; i < n; i++) {
    const c = cells[Math.floor(Math.random() * cells.length)]
    if (!c) continue
    c.style.transition = 'color .05s'
    c.style.color = '#fff'; c.style.fontSize = '20px'
    setTimeout(() => { c.style.color = c.dataset.base; c.style.fontSize = '17px' }, 150 + Math.random()*200)
  }
  setTimeout(twinkle, 80 + Math.random() * 250)
}
twinkle()
</script>
</body>
</html>
