<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preview 4 — Bandes nettes</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }

  /*
    Couleurs exactes (depuis le picker) :
      #FFFFFF  blanc
      #00CCFF  cyan
      #FBFF00  jaune
      #FB97D3  rose clair
      #E74FA5  rose vif
    Bande = zone pure + courte transition, puis retour blanc pour loop sans couture.
  */
  body {
    background: repeating-linear-gradient(
      180deg,
      #ffffff   0px,    /* blanc pur */
      #ffffff  30px,
      #00ccff  90px,   /* → cyan */
      #00ccff 150px,   /* cyan pur */
      #fbff00 210px,   /* → jaune */
      #fbff00 280px,   /* jaune pur */
      #fb97d3 340px,   /* → rose clair */
      #fb97d3 420px,   /* rose clair pur */
      #e74fa5 480px,   /* → rose vif */
      #e74fa5 540px,   /* rose vif pur */
      #ffffff 600px    /* retour blanc → loop sans couture */
    );
    background-size: 100% 600px;
    animation: slide 4s linear infinite;
  }

  @keyframes slide {
    0%   { background-position: 0 0; }
    100% { background-position: 0 600px; }
  }

  /* ── Grille d'étoiles (simulation) ── */
  #stars {
    position: fixed;
    inset: 0;
    display: grid;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Contenu centré ── */
  .content {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    z-index: 2;
  }
  .title {
    font-family: Georgia, serif;
    font-style: italic;
    font-size: 38px;
    color: #fff;
    text-shadow: 0 2px 14px rgba(0,0,0,.22);
    letter-spacing: -0.02em;
    text-align: center;
  }
  .field {
    width: 290px;
    height: 52px;
    background: rgba(255,255,255,0.85);
    border-radius: 100px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    font-family: Georgia, serif;
    font-size: 18px;
    color: #999;
  }
  .btn {
    width: 155px;
    height: 52px;
    background: linear-gradient(180deg,#E3F5FE 0%,#0063E7 49.52%,#60D9FE 100%);
    border: 1px solid #0052BC;
    border-radius: 100px;
    color: #fff;
    font-family: Georgia, serif;
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .badge {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.35);
    color: #fff;
    font-family: sans-serif;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 100px;
    z-index: 10;
    white-space: nowrap;
  }

  /* ── Contrôles vitesse ── */
  .controls {
    position: fixed;
    top: 14px;
    right: 14px;
    display: flex;
    gap: 6px;
    z-index: 10;
  }
  .ctrl {
    background: rgba(0,0,0,0.35);
    color: #fff;
    font-family: sans-serif;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
  }
  .ctrl.active { background: rgba(0,0,0,0.7); }
</style>
</head>
<body>

<div id="stars"></div>

<div class="content">
  <div class="title">compatibilité<br>astrale</div>
  <div class="field">prénom 1</div>
  <div class="field">prénom 2</div>
  <div class="field">date de naissance</div>
  <div class="btn">voir</div>
</div>

<div class="controls">
  <button class="ctrl" onclick="setSpeed(6)">lent</button>
  <button class="ctrl active" onclick="setSpeed(4)">normal</button>
  <button class="ctrl" onclick="setSpeed(2)">rapide</button>
</div>

<div class="badge">blanc → cyan → jaune → rose clair → rose vif · loop 600px</div>

<script>
function setSpeed(s) {
  document.body.style.animationDuration = s + 's'
  document.querySelectorAll('.ctrl').forEach(b => b.classList.remove('active'))
  event.target.classList.add('active')
}

const SYMS = ['✩','✧','＊','*','˚','₊','⁺','°','✦','⋆','˖','•','‧',
  '★','✪','☆','✨','💫','✱','✰','⋆','˖']
const COLORS = [
  '#b3eeff','#99e8ff','#ccf5ff','#fff',
  '#fffdb3','#fff799','#fffacc',
  '#fdc8e8','#fbaad8','#f9d6ee',
  '#f48cc5','#ee6baf','#fff',
  '#ffffff','#e0f9ff'
]

const grid = document.getElementById('stars')
const CELL = 32
function build() {
  grid.innerHTML = ''
  const cols = Math.ceil(window.innerWidth / CELL)
  const rows = Math.ceil(window.innerHeight / CELL)
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`
  grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`
  const cells = []
  for (let i = 0; i < cols * rows; i++) {
    const d = document.createElement('div')
    d.style.cssText = 'display:flex;align-items:center;justify-content:center;font-size:17px;'
    d.textContent = SYMS[Math.floor(Math.random() * SYMS.length)]
    const c = COLORS[Math.floor(Math.random() * COLORS.length)]
    d.style.color = c
    d.dataset.base = c
    grid.appendChild(d)
    cells.push(d)
  }
  return cells
}
let cells = build()
window.addEventListener('resize', () => { cells = build() })

function twinkle() {
  const n = Math.floor(Math.random() * 4) + 1
  for (let i = 0; i < n; i++) {
    const c = cells[Math.floor(Math.random() * cells.length)]
    if (!c) continue
    c.style.transition = 'color .05s'
    c.style.color = '#fff'
    c.style.fontSize = '20px'
    setTimeout(() => { c.style.color = c.dataset.base; c.style.fontSize = '17px' }, 150 + Math.random()*200)
  }
  setTimeout(twinkle, 80 + Math.random() * 250)
}
twinkle()
</script>
</body>
</html>
